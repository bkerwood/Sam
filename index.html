<!DOCTYPE html>
<html>
<head>
    <title>Hotel Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            width: 420px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: #2c3e7a;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h2 { font-size: 18px; }
        .header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
        }
        .bot { background: #f0f4ff; align-self: flex-start; }
        .user { 
            background: #2c3e7a; 
            color: white; 
            align-self: flex-end; 
        }
        .input-area {
            padding: 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        button {
            background: #2c3e7a;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .loading { opacity: 0.6; font-style: italic; }
        @media (max-width: 480px) {
            body { align-items: flex-end; background: white; }
            .container { width: 100%; height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🏨 Staff Assistant</h2>
            <p>Ask me anything about our policies</p>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                Hi! I'm Sam, your hotel assistant. Ask me anything about 
                check-in, checkout, guest policies, and procedures.
            </div>
        </div>
        <div class="input-area">
            <input 
                type="text" 
                id="input" 
                placeholder="Ask a question..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("input");
            const messages = document.getElementById("messages");
            const question = input.value.trim();
            if (!question) return;

            messages.innerHTML += `
                <div class="message user">${question}</div>
            `;
            input.value = "";

            messages.innerHTML += `
                <div class="message bot loading" id="loading">
                    Sam is thinking...
                </div>
            `;
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch(
                    `/ask?question=${encodeURIComponent(question)}`, 
                    { method: "POST" }
                );
                const data = await response.json();
                document.getElementById("loading").remove();
                messages.innerHTML += `
                    <div class="message bot">${data.answer}</div>
                `;
            } catch (error) {
                document.getElementById("loading").remove();
                messages.innerHTML += `
                    <div class="message bot">
                        Sorry, something went wrong. Please try again.
                    </div>
                `;
            }
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
